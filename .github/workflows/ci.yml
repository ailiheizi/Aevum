name: CI

# 为什么存在(审计 P1-1):核心安全行为(setuid 位、symlink 保留、原子 rename、
# dlopen 闭包)全在 #[cfg(unix)] 测试里。作者开发机是 Windows,本地 `cargo test`
# 把这些全跳过 —— unix 回归可以绿着合进来。这个 workflow 在 ubuntu 上真跑它们。
#
# 依赖来源:clean checkout 无 .cargo/config.toml(P1-2 起不再提交),默认走 crates.io,
# CI 无需 vendor/ 即可联网构建。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # 阻断门:build + test 必须过。这两项已在开发中反复验证为绿。
  build-test:
    name: build & test (ubuntu, unix tests real-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # .deb 解包链路需要 ar/tar/xz;ubuntu runner 默认有 tar/xz,binutils 给 `ar`。
      - name: Install unpack tools
        run: sudo apt-get update && sudo apt-get install -y binutils xz-utils

      - name: Build workspace
        run: cargo build --workspace --locked

      # 在 unix 上真跑全套(含 #[cfg(unix)] 安全测试)。需 fixture/网络的集成测试
      # 自身会 eprintln SKIP 并 return,不算失败 —— 见各 tests/*.rs 顶部守卫。
      - name: Test workspace
        run: cargo test --workspace --locked

  # 建议门:fmt + clippy 暂不阻断(作者尚未本地校准格式/lint),先报告。
  # 待一次清理后把 continue-on-error 去掉、clippy 加 -D warnings 转为阻断。
  lint:
    name: fmt & clippy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.85 + components
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: rustfmt, clippy
      - name: rustfmt check
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets
